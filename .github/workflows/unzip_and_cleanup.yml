
name: Auto Extract and Clean Zip

on:
  push:
    branches:
      - main
      - master

# Repository contents ကို ပြန်လည်ရေးသားခွင့် ပေးရန်လိုအပ်ပါသည်
permissions:
  contents: write

jobs:
  unzip-and-clean:
    # ဤ workflow bot ကိုယ်တိုင် commit လုပ်ထားသော push ဖြစ်ပါက ပြန်မပတ်စေရန် ကာကွယ်ခြင်း
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find and Extract Zip Files
        id: extract
        run: |
          # Repository အတွင်းရှိ .zip ဖိုင်များအားလုံးကို ရှာဖွေပါမည် (.git သို့မဟုတ် လျှို့ဝှက်ဖိုင်များ မပါဝင်ပါ)
          ZIP_FILES=$(find . -name "*.zip" -not -path "*/.*")
          
          if [ -z "$ZIP_FILES" ]; then
            echo "No zip files found to process."
            echo "extracted=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "extracted=true" >> $GITHUB_OUTPUT
          
          for zip in $ZIP_FILES; do
            echo "Processing ZIP file: $zip"
            target_dir=$(dirname "$zip")
            
            # Zip file ကို ၎င်းရှိရာ လမ်းကြောင်းထဲတွင်ပင် Extract လုပ်ပါမည် (Extract Here)
            unzip -o "$zip" -d "$target_dir"
            
            # Extract လုပ်ခြင်း အောင်မြင်ခဲ့ပါက မူလ zip file ကို အပြီးတိုင် ဖျက်ပါမည်
            if [ $? -eq 0 ]; then
              echo "Extraction successful. Deleting source file: $zip"
              rm "$zip"
            else
              echo "Error: Failed to extract $zip"
              exit 1
            fi
          done

      - name: Commit and Push Changes
        if: steps.extract.outputs.extracted == 'true'
        run: |
          # GitHub Actions Bot configuration ပြုလုပ်ခြင်း
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ပြောင်းလဲမှုအားလုံးကို staging area ထဲသို့ ထည့်ခြင်း
          git add -A
          
          # အမှန်တကယ် ပြောင်းလဲသွားသော data ရှိ၊ မရှိ စစ်ဆေးပြီးမှ push လုပ်ပါမည်
          if git diff-index --quiet HEAD; then
            echo "No changes detected to commit."
          else
            git commit -m "chore: auto-extract zip assets and cleanup [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

